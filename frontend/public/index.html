<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />

    <!-- ── PWA essentials ── -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <meta name="theme-color" content="#1a4a2e" />

    <!-- ── Viewport — critical for mobile ── -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, minimum-scale=1,
               maximum-scale=5, viewport-fit=cover"
    />

    <!-- ── Favicon — SVG first (best quality), PNG fallback ── -->
    <link rel="icon" type="image/svg+xml" href="%PUBLIC_URL%/ayucare-icon.svg" />
    <link rel="icon" type="image/png"     href="%PUBLIC_URL%/icons/icon-192x192.png" sizes="192x192" />
    <link rel="icon" type="image/png"     href="%PUBLIC_URL%/icons/icon-96x96.png"   sizes="96x96" />
    <link rel="shortcut icon"             href="%PUBLIC_URL%/icons/icon-192x192.png" />

    <!-- ── iOS PWA support ── -->
    <meta name="apple-mobile-web-app-capable"          content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title"            content="AyuCare" />
    <link rel="apple-touch-icon"                       href="%PUBLIC_URL%/icons/icon-192x192.png" />
    <link rel="apple-touch-icon" sizes="152x152"       href="%PUBLIC_URL%/icons/icon-152x152.png" />
    <link rel="apple-touch-icon" sizes="180x180"       href="%PUBLIC_URL%/icons/icon-192x192.png" />

    <!-- ── Android / general PWA ── -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name"       content="AyuCare" />

    <!-- ── Microsoft tiles ── -->
    <meta name="msapplication-TileColor" content="#1a4a2e" />
    <meta name="msapplication-TileImage" content="%PUBLIC_URL%/icons/icon-144x144.png" />
    <meta name="msapplication-config"    content="none" />

    <!-- ── SEO / Description ── -->
    <meta
      name="description"
      content="AyuCare — Comprehensive Ayurvedic Diet Management for practitioners and patients. Track your Prakriti, diet charts, progress and appointments."
    />

    <!-- ── Open Graph (WhatsApp / social link preview) ── -->
    <meta property="og:title"       content="AyuCare — Ayurvedic Diet Management" />
    <meta property="og:description" content="Your personal Ayurvedic wellness companion" />
    <meta property="og:type"        content="website" />
    <meta property="og:image"       content="%PUBLIC_URL%/icons/icon-512x512.png" />

    <!-- ── Loading spinner shown before React mounts ── -->
    <style>
      body {
        margin: 0;
        background-color: #FAFAF5;
      }
      #root:empty::before {
        content: '';
        display: block;
        width: 48px;
        height: 48px;
        margin: 45vh auto 0;
        border: 3px solid #2d6a4f;
        border-top-color: transparent;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>

    <title>AyuCare</title>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run AyuCare.</noscript>
    <div id="root"></div>
  </body>
</html>
